<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>JavaScript DataTypes, Let Keywords and Loops</h1>
    <p id="result"></p>
    <script>
        var i; // is undefined
        var text = "";
        {
            let i = 0;
            // assinging a value of i within the block
            while (i < 10){
           text += "The value inside the block "+ i + "<br>";
            i++;
            document.getElementById('result').innerHTML = text;
        }
        }
        document.write("The value of i outside the block" + i);
    </script>
</body>
</html>
