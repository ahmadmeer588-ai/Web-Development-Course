<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>JavaScript Join Method</p>
    <p id="myJoin"></p>
    <p id="myfirstjoin"></p>
    <p id="mysecondjoin"></p>
    <script>
        var fruits = ["Banana", "Orange", "Apple", "Mango"];

        document.getElementById("myJoin").innerHTML = fruits.join("*");
        document.getElementById("myfirstjoin").innerHTML = fruits;
        fruits.pop();
        document.getElementById("mysecondjoin").innerHTML = fruits;
    </script>
</body>
</html>
